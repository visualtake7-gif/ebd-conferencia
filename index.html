<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Inscrição – Evento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  box-sizing:border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#08ac02,#07c001);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:460px;
  background:#ffffff;
  border-radius:16px;
  box-shadow:0 20px 40px rgba(0,0,0,.15);
  overflow:hidden;
}

.header{
  background:linear-gradient(135deg,#018845,#00b118);
  color:#ffffff;
  padding:24px 24px 20px 24px;
}

.header h1{
  margin:0;
  font-size:22px;
  font-weight:700;
}

.header p{
  margin:6px 0 0;
  font-size:14px;
  opacity:.9;
}

.form-area{
  padding:24px;
}

.field{
  margin-bottom:16px;
}

label{
  display:block;
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
  color:#333;
}

input{
  width:100%;
  padding:12px 14px;
  border-radius:8px;
  border:1px solid #dcdcdc;
  font-size:15px;
  outline:none;
  transition:.2s;
}

input:focus{
  border-color:#1f6fff;
  box-shadow:0 0 0 2px rgba(31,111,255,.1);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#018845,#00b118);
  color:#fff;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 18px rgba(31,111,255,.35);
}

button:disabled{
  opacity:.6;
  cursor:default;
  transform:none;
  box-shadow:none;
}

#msg{
  margin-top:14px;
  text-align:center;
  font-size:14px;
  font-weight:600;
  color:#1f6fff;
}

.footer{
  text-align:center;
  padding:14px;
  font-size:12px;
  color:#777;
  border-top:1px solid #eee;
}
</style>
</head>
<body>

<div class="card">

  <div class="header">
    <h1>Inscrição para o Chá entre Meninas</h1>
    <p>Preencha seus dados para garantir sua participação</p>
  </div>

  <div class="form-area">

    <form id="formInscricao">

      <div class="field">
        <label>Nome completo</label>
        <input type="text" name="nome" required>
      </div>

      <div class="field">
        <label>Telefone</label>
        <input type="text" name="telefone" required>
      </div>

      <div class="field">
        <label>E-mail</label>
        <input type="email" name="email" required>
      </div>

      <div class="field">
        <label>Congregação</label>
        <input type="text" name="congregacao" required>
      </div>

      <button type="submit" id="btn">
        Continuar para o pagamento
      </button>

    </form>

    <div id="msg"></div>

  </div>

  <div class="footer">
    Criado por Bruno Sistema de inscrição online
  </div>

</div>

<script>
const form = document.getElementById("formInscricao");
const msg  = document.getElementById("msg");
const btn  = document.getElementById("btn");

/* URL do Web App (Google Apps Script) */
const urlScript = "https://script.google.com/macros/s/AKfycbw_b4zpX14IshkmMYjPhWOS6p5nbATczGTquY20g82gCoioFpC-vLpJ-mOCPbjgdXo9Mw/exec";

/* Seu link de pagamento */
const linkPagamento = "https://checkout.nubank.com.br/7c5DzBjn7G13vdnd";

form.addEventListener("submit", function(e){
  e.preventDefault();

  btn.disabled = true;
  msg.innerText = "Salvando sua inscrição...";

  const dados = new FormData(form);

  fetch(urlScript,{
    method:"POST",
    body:dados
  })
  .then(r => r.text())
  .then(resposta => {

    if(resposta.trim() === "OK"){
      msg.innerText = "Inscrição realizada. Redirecionando para o pagamento...";
      setTimeout(() => {
        window.location.href = linkPagamento;
      }, 800);
    }else{
      msg.innerText = "Não foi possível salvar sua inscrição.";
      btn.disabled = false;
    }

  })
  .catch(() => {
    msg.innerText = "Falha na conexão. Tente novamente.";
    btn.disabled = false;
  });

});
</script>

</body>
</html>
